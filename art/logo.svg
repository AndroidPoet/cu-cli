<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#F8F9FA"/>
  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#grad)" />
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#FF5633"/>
      <stop offset="50%" stop-color="#7B68EE"/>
      <stop offset="100%" stop-color="#2D9CDB"/>
    </linearGradient>
  </defs>
  <!-- ClickUp / Checklist icon representation -->
  <g transform="translate(600, 130)">
    <!-- Checklist box -->
    <rect x="-50" y="-45" width="100" height="90" rx="10" stroke="#7B68EE" stroke-width="3" fill="none"/>
    <!-- Check mark -->
    <path d="M-25,5 L-10,20 L25,-15" stroke="#FF5633" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Lines representing tasks -->
    <line x1="-30" y1="-25" x2="30" y2="-25" stroke="#7B68EE" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="-20" y1="-15" x2="20" y2="-15" stroke="#7B68EE" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  </g>
  <!-- Title -->
  <text x="600" y="225" text-anchor="middle" fill="#1F2328" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" letter-spacing="-1">CU-CLI</text>
  <!-- Subtitle -->
  <text x="600" y="263" text-anchor="middle" fill="#656D76" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" letter-spacing="0.3">ClickUp from your terminal</text>
  <!-- Tagline -->
  <text x="600" y="298" text-anchor="middle" fill="#7B68EE" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" letter-spacing="0.5">Tasks · Lists · Workspaces · Automation</text>
</svg>
